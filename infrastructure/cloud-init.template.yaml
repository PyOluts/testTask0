#cloud-config
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg-agent
  - software-properties-common
  - ufw

runcmd:
  # 1. Firewall Configuration: Block public SSH, allow HTTP/HTTPS
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  
  # 2. Install Docker
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sh get-docker.sh
  
  # 3. Install Tailscale & Authenticate
  - curl -fsSL https://tailscale.com/install.sh | sh
  # Bring Tailscale up with SSH enabled (Tailscale Auth Key injected by deploy.sh)
  - tailscale up --authkey=${TAILSCALE_AUTHKEY} --ssh

  # 4. Deploy Ghost via Docker Compose
  - mkdir -p /opt/ghost
  - |
    cat << 'EOF' > /opt/ghost/docker-compose.yml
    version: '3.8'
    services:
      ghost:
        image: ghost:latest
        restart: always
        ports:
          - "80:2368"
        environment:
          url: http://localhost # Replace with actual domain when configured
        volumes:
          - ghost_content:/var/lib/ghost/content
    volumes:
      ghost_content:
    EOF
  - cd /opt/ghost && docker compose up -d
